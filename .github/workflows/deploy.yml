name: github pages

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Hugo
        env:
          HUGO_VERSION: 0.157.0
        run: |
          curl -fsSL -o hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Restore Hugo resource cache
        uses: actions/cache@v5
        with:
          path: |
            resources/_gen/images
          key: ${{ runner.os }}-hugo-images-${{ hashFiles('config.yaml', 'content/**', 'assets/**', 'layouts/**', 'themes/hugo-theme-stack/assets/**', 'themes/hugo-theme-stack/layouts/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-images-

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENV: production
          HUGO_ENVIRONMENT: production
        run: |
          rm -rf resources/_gen/assets/scss
          hugo --gc --minify

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
