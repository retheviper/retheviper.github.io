name: github pages

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Install Hugo
        env:
          HUGO_VERSION: 0.157.0
        run: |
          curl -fsSL -o hugo.tar.gz "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz"
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Restore Hugo resource cache
        uses: actions/cache@v4
        with:
          path: |
            resources/_gen/images
          key: ${{ runner.os }}-hugo-images-${{ hashFiles('config.yaml', 'content/**', 'assets/**', 'layouts/**', 'themes/hugo-theme-stack/assets/**', 'themes/hugo-theme-stack/layouts/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-images-

      - name: Build
        env:
          HUGO_ENV: production
          HUGO_ENVIRONMENT: production
        run: |
          rm -rf resources/_gen/assets/scss
          hugo --gc --minify

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          git fetch origin gh-pages
          git worktree add --detach "$tmp_dir" origin/gh-pages

          find "$tmp_dir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a public/. "$tmp_dir"/
          touch "$tmp_dir/.nojekyll"

          cd "$tmp_dir"
          git checkout -B gh-pages
          git add --all

          if git diff --cached --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
