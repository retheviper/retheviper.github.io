{{ if (.Context.Scratch.Get "TOCEnabled") }}
    <section class="widget archives">
        <div class="widget-icon">
            {{ partial "helper/icon" "hash" }}
        </div>
        <h2 class="widget-title section-title">{{ if eq .Context.Site.Language.Lang "ko" }}목차{{ else if eq .Context.Site.Language.Lang "ja" }}Table of contents{{ else }}{{ T "article.tableOfContents" }}{{ end }}</h2>
        
        <div class="widget--toc">
            {{ .Context.TableOfContents }}
        </div>
    </section>
{{ end }}
