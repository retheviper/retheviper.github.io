{{- $query := first 1 (where .Site.Pages "Layout" "==" "search") -}}
{{- if $query -}}
    {{- $searchPage := index $query 0 -}}
    <form action="{{ $searchPage.RelPermalink }}" class="search-form widget" {{ with .OutputFormats.Get "json" -}}data-json="{{ .Permalink }}" {{- end }}>
        <p>
            <label>{{ if or (eq .Site.Language.Lang "ko") (eq .Site.Language.Lang "ja") }}Search{{ else }}{{ T "search.title" }}{{ end }}</label>
            <input name="keyword" required placeholder="{{ if or (eq .Site.Language.Lang "ko") (eq .Site.Language.Lang "ja") }}Type to search...{{ else }}{{ T `search.placeholder` }}{{ end }}" />
        
            <button title="{{ if or (eq .Site.Language.Lang "ko") (eq .Site.Language.Lang "ja") }}Search{{ else }}{{ T `search.title` }}{{ end }}">
                {{ partial "helper/icon" "search" }}
            </button>
        </p>
    </form>
{{- else -}}
    {{- warnf "Search page not found. Create a page with layout: search." -}}
{{- end -}}
